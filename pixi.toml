[workspace]
authors = ["artalatarta <artur@mucowski.pl>"]
channels = ["conda-forge"]
name = "simulator"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "0.1.0"

[tasks]
start = "python main.py"
lint = "ruff check ."
format = "ruff format ."
typecheck = "pyright"
test = "pytest"
analysis = "jupyter nbconvert --to notebook --execute --inplace analysis/analysis.ipynb"

[dependencies]
python = ">=3.14.4,<3.15"
simpy = ">=4.1.1,<5"
ruff = ">=0.15.11,<0.16"
ipykernel = ">=7.3.0,<8"
questionary = ">=2.1.1,<3"
pytest = ">=9.0.2,<10"
pylint = ">=4.0.2,<5"
graphviz = ">=13.1.2,<14"
pyright = ">=1.1.410,<2"
pandas = ">=2.3.0,<3"
matplotlib = ">=3.10.0,<4"
seaborn = ">=0.13.2,<0.14"
nbconvert = ">=7.16.0,<8"
pixi-kernel = ">=0.7.1,<0.8"

[pypi-dependencies]
openai = ">=1.0,<2"
python-dotenv = ">=1.0,<2"
